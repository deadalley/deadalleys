{{ define "main" }} {{ partial "page-header.html" . }}

<section>
  <div class="container mx-auto px-6 relative z-10">
    {{ $videos := site.Data.youtube.videos }} {{ if $videos }}
    <!-- Videos Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      {{ range $videos }} {{ partial "video-card.html" . }} {{ end }}
    </div>
    {{ else }}
    <!-- Under Construction Message -->
    <div class="text-center py-16">
      <div class="max-w-md mx-auto">
        <div class="mb-8">
          <i class="fas fa-video text-6xl text-gray-400 mb-4"></i>
        </div>
        <h3 class="text-2xl font-bold text-white mb-4">No Videos Yet</h3>
        <p class="text-gray-300">Check back soon for videos!</p>
      </div>
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
