{{/* Video Card Partial — displays an embedded YouTube video with metadata */}}

<div
  class="bg-gray-900 rounded-lg overflow-hidden hover:shadow-2xl transition-all duration-300 h-full flex flex-col group"
>
  <!-- Thumbnail / Embed — clicking opens video in new tab -->
  <a
    href="{{ .url }}"
    target="_blank"
    rel="noopener noreferrer"
    class="block flex-shrink-0"
  >
    <div class="relative overflow-hidden bg-black w-full" style="height: 220px">
      <iframe
        src="{{ .embedUrl }}?rel=0"
        title="{{ .title }}"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
        "
        allowfullscreen
        loading="lazy"
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%"
      ></iframe>
    </div>
  </a>

  <!-- Content -->
  <div class="p-6 flex flex-col flex-grow">
    <!-- Title — clicking opens video in new tab -->
    <h3 class="text-lg font-bold mb-3 line-clamp-2">
      <a
        href="{{ .url }}"
        target="_blank"
        rel="noopener noreferrer"
        class="text-white hover:text-red-500 transition-colors duration-300"
      >
        {{ .title }}
      </a>
    </h3>

    <!-- Description -->
    {{ if .description }}
    <p class="text-gray-300 text-sm mb-4 flex-grow line-clamp-3">
      {{ .description }}
    </p>
    {{ end }}

    <!-- Date -->
    {{ if .publishedDate }}
    <div class="flex items-center text-gray-400 text-xs mt-auto">
      <i class="far fa-calendar mr-2"></i>
      <span>{{ .publishedDate }}</span>
    </div>
    {{ end }}
  </div>
</div>
